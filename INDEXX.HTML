<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .page {
            display: none;
            width: 100%;
            min-height: 100vh;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .page.active {
            display: flex;
        }

        /* PAGE 1 - Porsche Background + Number Buttons */
        #page1 {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
                        url('https://images.unsplash.com/photo-1544636331-e26879cd4e9b?w=1920');
            background-size: cover;
            background-position: center;
        }

        .password-box {
            background: rgba(0,0,0,0.8);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #e74c3c;
        }

        .password-box h2 {
            color: white;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .display {
            background: white;
            color: #333;
            font-size: 30px;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            min-width: 200px;
            letter-spacing: 10px;
            font-weight: bold;
        }

        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .key {
            background: #333;
            color: white;
            border: 2px solid #e74c3c;
            padding: 20px;
            font-size: 24px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .key:hover {
            background: #e74c3c;
        }

        .key.clear {
            background: #c0392b;
            grid-column: span 2;
        }

        .key.enter {
            background: #27ae60;
            grid-column: span 2;
        }

        /* PAGE 2 - Happy Birthday My Sweet Boy */
        #page2 {
            background: linear-gradient(135deg, #ff9a9e, #fecfef, #ff9a9e);
        }

        #page2 h1 {
            color: #e74c3c;
            font-size: 2.5em;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            animation: pulse 2s infinite;
        }

        #page2 p {
            color: #333;
            font-size: 1.5em;
            margin: 30px 0;
            line-height: 1.8;
        }

        .next-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
        }

        /* PAGE 3 - SORRYYY */
        #page3 {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
        }

        #page3 h1 {
            color: white;
            font-size: 3em;
            animation: pulse 1s infinite;
        }

        .sorry-box {
            background: rgba(255,255,255,0.95);
            padding: 20px;
            border-radius: 20px;
            max-height: 50vh;
            overflow-y: auto;
            margin: 20px;
        }

        .sorry-text {
            font-size: 18px;
            color: #e74c3c;
            font-weight: bold;
            line-height: 2;
            text-align: center;
        }

        /* PAGE 4 - Happy Birthday My Love Image */
        #page4 {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        #page4 h1 {
            color: white;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .love-img {
            max-width: 90%;
            max-height: 60vh;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            animation: float 3s ease-in-out infinite;
        }

        /* PAGE 5 - Car Image Final */
        #page5 {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        }

        #page5 h1 {
            color: white;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .car-img {
            max-width: 90%;
            max-height: 70vh;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(231,76,60,0.5); }
            50% { box-shadow: 0 0 50px rgba(231,76,60,0.8); }
        }
    </style>
</head>
<body>

    <!-- PAGE 1: PASSWORD WITH NUMBER BUTTONS -->
    <div id="page1" class="page active">
        <div class="password-box">
            <h2>ENTER PASSWORD</h2>
            <div class="display" id="display"></div>
            <div class="keypad">
                <button class="key" onclick="addNumber('1')">1</button>
                <button class="key" onclick="addNumber('2')">2</button>
                <button class="key" onclick="addNumber('3')">3</button>
                <button class="key" onclick="addNumber('4')">4</button>
                <button class="key" onclick="addNumber('5')">5</button>
                <button class="key" onclick="addNumber('6')">6</button>
                <button class="key" onclick="addNumber('7')">7</button>
                <button class="key" onclick="addNumber('8')">8</button>
                <button class="key" onclick="addNumber('9')">9</button>
                <button class="key clear" onclick="clearDisplay()">CLEAR</button>
                <button class="key" onclick="addNumber('0')">0</button>
                <button class="key enter" onclick="checkPassword()">ENTER</button>
            </div>
        </div>
    </div>

    <!-- PAGE 2: HAPPY BIRTHDAY MY SWEET BOY -->
    <div id="page2" class="page">
        <h1>Happy Birthday My Sweet Boy</h1>
        <p>Cheers to you for another trip around the sun!<br>Hope your day is filled with everything you love</p>
        <button class="next-btn" onclick="nextPage(3)">NEXT</button>
    </div>

    <!-- PAGE 3: SORRYYY -->
    <div id="page3" class="page">
        <h1>SORRYYY!!!</h1>
        <div class="sorry-box">
            <div id="sorryContainer" class="sorry-text"></div>
        </div>
        <button class="next-btn" onclick="nextPage(4)">NEXT</button>
    </div>

    <!-- PAGE 4: HAPPY BIRTHDAY MY LOVE IMAGE -->
    <div id="page4" class="page">
        <h1>Happy Birthday My Love</h1>
        <img class="love-img" src="https://i.pinimg.com/474x/ee/21/f1/ee21f1c8c00cffaf13dae151487420a3.jpg" alt="Love">
        <button class="next-btn" onclick="nextPage(5)">NEXT</button>
    </div>

    <!-- PAGE 5: CAR IMAGE - FINAL -->
    <div id="page5" class="page">
        <h1>Happy Birthday</h1>
        <img class="car-img" src="https://imgcdn.stablediffusionweb.com/2024/4/6/86dd6f86-ec09-4dfb-98ba-d83ae075106a.jpg" alt="Car">
    </div>

    <script>
        let currentPassword = "";

        function addNumber(num) {
            if (currentPassword.length < 4) {
                currentPassword += num;
                document.getElementById('display').innerText = currentPassword;
            }
        }

        function clearDisplay() {
            currentPassword = "";
            document.getElementById('display').innerText = "";
        }

        function checkPassword() {
            if (currentPassword === "2107") {
                nextPage(2);
            } else {
                alert("Wrong password!");
                clearDisplay();
            }
        }

        function nextPage(pageNumber) {
            var pages = document.querySelectorAll('.page');
            pages.forEach(p => p.classList.remove('active'));
            document.getElementById('page' + pageNumber).classList.add('active');
            
            if (pageNumber === 3) {
                generateSorry();
            }
        }

        function generateSorry() {
            var container = document.getElementById('sorryContainer');
            if (container.innerHTML.trim() === "") {
                let text = "";
                for (let i = 0; i < 1000; i++) {
                    text += "SORRYYY ";
                }
                container.innerHTML = text;
            }
        }
    </script>

</body>
</html>
